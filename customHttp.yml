customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'no-referrer'
      - key: 'Permissions-Policy'
        value: 'geolocation=(self), camera=(), microphone=()'
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://unpkg.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://gs-loc.apple.com https://geocoding-api.open-meteo.com https://photon.komoot.io https://nominatim.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
  - pattern: '/scripts/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=300, must-revalidate'
  - pattern: '/modules/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=300, must-revalidate'
  - pattern: '**/*.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache'
